services:
  postgres:
    image: postgres:17.8-alpine3.23
    container_name: guild-postgres
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: appuser
      POSTGRES_DB: guilddb
    ports:
      - "5432:5432"
    volumes:
      - guild_pgdata:/var/lib/postgresql/data
      - ./init/:/docker-entrypoint-initdb.d

volumes:
  guild_pgdata:
